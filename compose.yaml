services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: pipeline
      POSTGRES_PWD: pipeline
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "workflow", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8088:8080"

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin
      && mc mb --ignore-existing local/document-pipeline"

  app-image:
    build: .
    image: document-pipeline:local
    profiles: ["build-only"]

  migration:
    image: document-pipeline:local
    build: .
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: document-pipeline:local
    build: .
    env_file: .env
    command: ["uvicorn", "document_pipeline.api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      migration:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  workflow-worker:
    image: document-pipeline:local
    env_file: .env
    command: ["python", "-m", "document_pipeline.workers.workflow_worker"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  extraction-worker:
    image: document-pipeline:local
    env_file: .env
    command: ["python", "-m", "document_pipeline.workers.extraction_worker"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  classification-worker:
    image: document-pipeline:local
    env_file: .env
    command: ["python", "-m", "document_pipeline.workers.classification_worker"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
